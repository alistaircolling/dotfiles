# Remap prefix from Ctrl-b to Option-Space
unbind C-b
set-option -g prefix M-Space
bind M-Space send-prefix

# Enable mouse support (scroll, select panes, resize)
set -g mouse on

# Fix mouse scrolling in iTerm2 — enter copy mode on scroll up, scroll 2 lines at a time
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# Slow down scroll speed (2 lines per tick instead of default 5)
set -g @scroll-speed-num-lines-per-scroll 2

# Quick cd to dotfiles directory (prefix + D)
bind D send-keys 'cd /Users/Shared/dotfiles' Enter
