# AeroSpace — tiling window manager with stable virtual workspaces.
# Replaces macOS Spaces so workspace numbers never drift (unlike Ctrl+number),
# and re-lays-out windows on display changes (fixes the fast-user-switch resize).
# Docs: https://nikitabobko.github.io/AeroSpace/guide

# AeroSpace manages its own login item; no launchd agent needed.
start-at-login = true

# One app per workspace fills the screen; extra windows tile.
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# No gaps — a lone window fills the display edge to edge (looks fullscreen).
[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.right = 0
outer.top = 0
outer.bottom = 0

# --- Keybindings -------------------------------------------------------------
# Only digits + one switcher key are bound, to avoid stealing the Option/Meta
# chords the terminal relies on (Option = Meta, Opt+Space leader, etc.).
[mode.main.binding]

# Focus a workspace by number — stable identity, never reorders.
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 0'

# Send the focused window to a workspace.
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 0'

# Desktop switcher: jump to a workspace by its content name (branch / app).
alt-tab = 'exec-and-forget /Users/Shared/dotfiles/scripts/desktop-switcher.sh'

# --- App auto-placement ------------------------------------------------------
# Distinct apps land on a fixed workspace whenever they open.

# Slack -> workspace 0 (your "10th" desktop).
[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['move-node-to-workspace 0']

# WezTerm windows all share one app-id and their title is the git branch, so
# they can't be reliably auto-placed (branches aren't unique across repos).
# Place a terminal with alt-shift-N once; stable nav (alt-N) then returns to
# it, and the switcher (alt-tab) finds any desktop by its branch.
